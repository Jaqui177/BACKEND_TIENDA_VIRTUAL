<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Virtual - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .section {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        
        .section h2 {
            color: #667eea;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            font-weight: bold;
        }
        
        .error {
            color: #e74c3c;
            background: #fadbd8;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }
        
        th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #ecf0f1;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .badge-cliente {
            background: #d4efdf;
            color: #186a3b;
        }
        
        .badge-admin {
            background: #fce4d6;
            color: #922b15;
        }
        
        .price {
            color: #27ae60;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .stock {
            color: #2980b9;
            font-weight: bold;
        }
        
        .header-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .header-info h3 {
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        
        .empty {
            text-align: center;
            color: #7f8c8d;
            padding: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛍️ Tienda Virtual - Dashboard</h1>
        
        <div class="header-info">
            <h3>Bienvenido al Sistema de Gestión</h3>
            <p>Aquí puedes ver todos los datos de la tienda virtual</p>
        </div>
        
        <!-- USUARIOS -->
        <div class="section">
            <h2>👥 Usuarios</h2>
            <div id="usuarios-container" class="loading">Cargando...</div>
        </div>
        
        <div class="grid">
            <!-- CATEGORÍAS -->
            <div class="section">
                <h2>📂 Categorías</h2>
                <div id="categorias-container" class="loading">Cargando...</div>
            </div>
            
            <!-- PRODUCTOS -->
            <div class="section">
                <h2>📦 Productos</h2>
                <div id="productos-container" class="loading">Cargando...</div>
            </div>
        </div>
        
        <div class="grid">
            <!-- CARRITOS -->
            <div class="section">
                <h2>🛒 Carritos</h2>
                <div id="carritos-container" class="loading">Cargando...</div>
            </div>
            
            <!-- CARRITO DETALLES -->
            <div class="section">
                <h2>📋 Detalles del Carrito</h2>
                <div id="detalles-container" class="loading">Cargando...</div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8000/api';

        // Función para obtener y mostrar datos
        async function cargarDatos() {
            try {
                // Cargar Usuarios
                await cargarUsuarios();
                // Cargar Categorías
                await cargarCategorias();
                // Cargar Productos
                await cargarProductos();
                // Cargar Carritos
                await cargarCarritos();
                // Cargar Detalles
                await cargarDetalles();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function cargarUsuarios() {
            try {
                const response = await fetch(`${API}/usuarios`);
                const datos = await response.json();
                const container = document.getElementById('usuarios-container');

                if (!Array.isArray(datos) || datos.length === 0) {
                    container.innerHTML = '<div class="empty">No hay usuarios</div>';
                    return;
                }

                let html = '<table><thead><tr><th>ID</th><th>Nombre</th><th>Email</th><th>Teléfono</th><th>Rol</th><th>Dirección</th></tr></thead><tbody>';
                datos.forEach(u => {
                    const badge = `<span class="badge ${u.rol === 'admin' ? 'badge-admin' : 'badge-cliente'}">${u.rol}</span>`;
                    html += `<tr>
                        <td><a href="buscar_usuario.html?id=${u.id}" style="color: #667eea; text-decoration: none;">${u.id}</a></td>
                        <td>${u.nombre}</td>
                        <td>${u.email}</td>
                        <td>${u.telefono}</td>
                        <td>${badge}</td>
                        <td>${u.direccion}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (error) {
                document.getElementById('usuarios-container').innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        async function cargarCategorias() {
            try {
                const response = await fetch(`${API}/categorias`);
                const datos = await response.json();
                const container = document.getElementById('categorias-container');

                if (!Array.isArray(datos) || datos.length === 0) {
                    container.innerHTML = '<div class="empty">No hay categorías</div>';
                    return;
                }

                let html = '<table><thead><tr><th>ID</th><th>Nombre</th></tr></thead><tbody>';
                datos.forEach(c => {
                    html += `<tr><td><a href="buscar_categoria.html?id=${c.id_categoria}" style="color: #667eea; text-decoration: none;">${c.id_categoria}</a></td><td>${c.nombre}</td></tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (error) {
                document.getElementById('categorias-container').innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        async function cargarProductos() {
            try {
                const response = await fetch(`${API}/productos`);
                const datos = await response.json();
                const container = document.getElementById('productos-container');

                if (!Array.isArray(datos) || datos.length === 0) {
                    container.innerHTML = '<div class="empty">No hay productos</div>';
                    return;
                }

                let html = '<table><thead><tr><th>ID</th><th>Nombre</th><th>Precio</th><th>Stock</th><th>Categoría</th></tr></thead><tbody>';
                datos.forEach(p => {
                    html += `<tr>
                        <td><a href="buscar_producto.html?id=${p.id}" style="color: #667eea; text-decoration: none;">${p.id}</a></td>
                        <td>${p.nombre}</td>
                        <td class="price">$${p.precio}</td>
                        <td class="stock">${p.stock}</td>
                        <td>${p.id_categoria}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (error) {
                document.getElementById('productos-container').innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        async function cargarCarritos() {
            try {
                const response = await fetch(`${API}/carritos`);
                const datos = await response.json();
                const container = document.getElementById('carritos-container');

                if (!Array.isArray(datos) || datos.length === 0) {
                    container.innerHTML = '<div class="empty">No hay carritos</div>';
                    return;
                }

                let html = '<table><thead><tr><th>ID</th><th>Usuario</th><th>Total</th><th>Fecha</th></tr></thead><tbody>';
                datos.forEach(c => {
                    html += `<tr>
                        <td><a href="buscar_carrito.html?id=${c.id_carrito}" style="color: #667eea; text-decoration: none;">${c.id_carrito}</a></td>
                        <td>${c.id_usuario}</td>
                        <td class="price">$${c.total}</td>
                        <td>${new Date(c.fecha_creacion).toLocaleDateString()}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (error) {
                document.getElementById('carritos-container').innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        async function cargarDetalles() {
            try {
                const response = await fetch(`${API}/carrito-detalles`);
                const datos = await response.json();
                const container = document.getElementById('detalles-container');

                if (!Array.isArray(datos) || datos.length === 0) {
                    container.innerHTML = '<div class="empty">No hay detalles</div>';
                    return;
                }

                let html = '<table><thead><tr><th>ID</th><th>Carrito</th><th>Producto</th><th>Cantidad</th><th>Precio</th></tr></thead><tbody>';
                datos.forEach(d => {
                    html += `<tr>
                        <td><a href="buscar_detalle.html?id=${d.id}" style="color: #667eea; text-decoration: none;">${d.id}</a></td>
                        <td>${d.id_carrito}</td>
                        <td>${d.id_producto}</td>
                        <td>${d.cantidad}</td>
                        <td class="price">$${d.precio_unitario}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (error) {
                document.getElementById('detalles-container').innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        // Cargar datos al abrir la página
        cargarDatos();

        // Recargar cada 5 segundos (opcional)
        // setInterval(cargarDatos, 5000);
    </script>
</body>
</html>
